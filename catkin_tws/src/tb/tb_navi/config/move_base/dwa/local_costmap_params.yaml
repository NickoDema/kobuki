local_costmap:
    footprint: '[ [ 0.60,  0.39],
                  [-0.60,  0.39],
                  [-0.60, -0.39],
                  [ 0.60, -0.39]]'
    footprint_padding: 0.01
    global_frame: map
    height: 5
    width: 5
    inflation_layer: {cost_scaling_factor: 2.0,
                      enabled: true,
                      inflate_unknown: false,
                      inflation_radius: 16.0}
    map_type: voxel
    obstacle_layer:
        combination_method: 1
        enabled: true
        footprint_clearing_enabled: true
        mark_threshold: 0
        max_obstacle_height: 0.6
        observation_sources: scan
        obstacle_range: 15
        origin_z: 0.0
        publish_voxel_map: false
        raytrace_range: 25
        scan:
          clearing: true
          inf_is_valid: true
          data_type: LaserScan
          marking: true
          max_obstacle_height: 3
          min_obstacle_height: 0.0
          topic: scan
        unknown_threshold: 15
        z_resolution: 0.2
        z_voxels: 2
    origin_x: 0.0
    origin_y: 0.0
    plugins:
        - {name: obstacle_layer, type: 'costmap_2d::VoxelLayer'}
        - {name: inflation_layer, type: 'costmap_2d::InflationLayer'}
    publish_frequency: 5.0
    resolution: 0.14
    robot_base_frame: base_footprint
    robot_radius: 0.46
    rolling_window: true
    static_map: false
    transform_tolerance: 2.0
    update_frequency: 5.0

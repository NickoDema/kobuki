local_costmap:
    footprint: '[ [ 0.56,  0.355],
                  [-0.56,  0.355],
                  [-0.56, -0.355],
                  [ 0.56, -0.355]]'
    global_frame: map
    robot_base_frame: base_footprint
    height: 5
    width: 5
    map_type: costmap
    obstacle_layer:
        combination_method: 1
        enabled: true
        footprint_clearing_enabled: true
        max_obstacle_height: 0.6
        observation_sources: scan
        obstacle_range: 15
        origin_z: 0.0
        publish_voxel_map: false
        raytrace_range: 25
        scan:
          clearing: true
          inf_is_valid: true
          clearing_triangles: true
          data_type: LaserScan
          marking: true
          max_obstacle_height: 3
          min_obstacle_height: 0.0
          topic: scan
        unknown_threshold: 15
        z_resolution: 0.2
        z_voxels: 2
    plugins:
        - {name: obstacle_layer, type: 'costmap_2d::ObstacleLayer'}
    publish_frequency: 5.0
    resolution: 0.05
    robot_radius: 0.46
    rolling_window: true
    static_map: false
    transform_tolerance: 2.0
    update_frequency: 5.0

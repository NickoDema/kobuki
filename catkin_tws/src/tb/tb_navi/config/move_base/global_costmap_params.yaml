global_costmap:
    update_frequency: 1.0
    publish_frequency: 1.0
    static_map: true
    transform_tolerance: 1.0
    resolution: 0.05
    robot_base_frame: base_footprint
    robot_radius: 0.46

    footprint: '[ [ 0.56,  0.37],
                  [-0.56,  0.37],
                  [-0.56, -0.37],
                  [ 0.56, -0.37]]'
    global_frame: map
    inflation_layer: {cost_scaling_factor: 2.0, enabled: true, inflate_unknown: false, inflation_radius: 16.0}
    map_type: costmap
    obstacle_layer:
        combination_method: 1
        enabled: true
        footprint_clearing_enabled: true
        mark_threshold: 0
        max_obstacle_height: 0.6
        observation_sources: scan
        obstacle_range: 15
        raytrace_range: 25
        origin_z: 0.0
        publish_voxel_map: false
        scan:
              clearing: true
              inf_is_valid: true
              clearing_triangles: true
              data_type: LaserScan
              marking: true
              max_obstacle_height: 3
              min_obstacle_height: 0.0
              obstacle_range: 15
              raytrace_range: 25
              topic: scan
        unknown_threshold: 15
        z_resolution: 0.2
        z_voxels: 2
    plugins:
        - {name: static_layer,    type: 'costmap_2d::StaticLayer'}
        - {name: obstacle_layer,  type: 'costmap_2d::ObstacleLayer'}
        - {name: inflation_layer, type: 'costmap_2d::InflationLayer'}
